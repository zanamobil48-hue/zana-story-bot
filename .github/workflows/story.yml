name: Repost Channel Posts to Telegram Story

on:
  schedule:
    # هەر 10 خولەک جارێک دەڕوات (دەتوانیت بیگۆڕیت)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run story bot
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python story.py

      - name: Commit updated state
        run: |
          git config user.name "story-bot"
          git config user.email "story-bot@users.noreply.github.com"
          touch last_message.json
          git add last_message.json
          git diff --staged --quiet || git commit -m "update last sent message id"
          git push
